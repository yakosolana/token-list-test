name: Secret Exfil Demo

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from the Actions tab

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run demo action (unpinned)
        uses: yakosolana/demo-action@v1   # tag – can be silently updated
        env:
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
